<!DOCTYPE html>
<html>
<head>
    <title>Resume - Cat Arase Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- LOAD HEADER -->
    <div id="header"></div>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header').innerHTML = data);
    </script>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2>Resume</h2>
        
        <div class="resume-container">
            <p style="margin-bottom: 1.5rem;">
                <a href="your-resume.pdf" download class="resume-download-btn">Download Resume (PDF)</a>
            </p>
            
            <object 
                data="cat-arase-resume.pdf" 
                type="application/pdf" 
                class="resume-viewer">
                <p>Your browser does not support PDF viewing. 
                    <a href="your-resume.pdf" download>Download the PDF here</a>
                </p>
            </object>
        </div>
    </div>

    <!-- LOAD FOOTER -->
    <div id="footer"></div>

    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
    </script>
</body>
</html>
